<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300" width="200" height="300">
  <defs>
    <radialGradient id="bg_zeno" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#12101a"/>
      <stop offset="100%" stop-color="#06060c"/>
    </radialGradient>
    <radialGradient id="skin_zeno" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#f8e8d4"/>
      <stop offset="100%" stop-color="#e4ceb8"/>
    </radialGradient>
    <linearGradient id="hair_zeno" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8f0e0"/>
      <stop offset="50%" stop-color="#d4c8a0"/>
      <stop offset="100%" stop-color="#8a8060"/>
    </linearGradient>
    <radialGradient id="crown_glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0c67c" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#f0c67c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
