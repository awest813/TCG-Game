  <!-- Back layer long -->
  <path d="M 56 164 Q 48 198 50 250 Q 52 274 58 290 Q 50 264 52 228 Q 54 196 60 168 Z" fill="#8a8060"/>
  <path d="M 144 164 Q 152 198 150 250 Q 148 274 142 290 Q 150 264 148 228 Q 146 196 140 168 Z" fill="#8a8060"/>
