  <path d="M 135 212 Q 130 210 129 237" stroke="#f0c67c" stroke-width="2" fill="none" opacity="0.8"/>
  <path d="M 65 212 Q 85 204 100 202 Q 115 204 135 212" stroke="#f0c67c" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M 90 198 L 100 224 L 110 198" fill="#f0c67c" opacity="0.4"/>
  <!-- Championship badge -->
  <polygon points="100,205 103,212 110,212 105,216 107,223 100,219 93,223 95,216 90,212 97,212" fill="#f0c67c" opacity="0.65" transform="scale(0.55) translate(82,170)"/>
  <path d="M 71 237 Q 89 227 100 225 Q 111 227 129 237 L 123 263 Q 105 254 100 252 Q 95 254 77 263 Z" fill="#0c0a12"/>

  <!-- Neck -->
  <path d="M 88 190 L 88 212 L 112 212 L 112 190 Z" fill="url(#skin_zeno)"/>

  <!-- Head -->
  <ellipse cx="100" cy="154" rx="43" ry="47" fill="url(#skin_zeno)"/>

