  <path d="M 58 148 Q 53 118 57 88 Q 63 58 82 46 Q 100 37 118 46 Q 137 58 143 88 Q 147 118 142 148 Q 124 130 100 128 Q 76 130 58 148 Z" fill="url(#hair_zeno)"/>
