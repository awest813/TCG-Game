  <path d="M 76 128 Q 85 124 93 127" stroke="#706040" stroke-width="1.7" fill="none" stroke-linecap="round"/>
  <path d="M 107 127 Q 115 124 124 128" stroke="#706040" stroke-width="1.7" fill="none" stroke-linecap="round"/>

  <!-- Eyes - gold/amber, serene intensity -->
  <ellipse cx="85" cy="140" rx="11" ry="9" fill="#0c0a08"/>
  <ellipse cx="85" cy="140" rx="10" ry="8" fill="#c8a030"/>
  <ellipse cx="85" cy="140" rx="7" ry="6.5" fill="#906010"/>
  <ellipse cx="85" cy="140" rx="4" ry="4" fill="#080604"/>
  <ellipse cx="82" cy="137" rx="2.5" ry="2" fill="white" opacity="0.9"/>
  <ellipse cx="88" cy="143" rx="1.2" ry="1.2" fill="white" opacity="0.4"/>
  <path d="M 74 131 Q 85 127 96 131" stroke="#403020" stroke-width="1.8" fill="none"/>
  <path d="M 75 148 Q 85 152 95 148" stroke="#403020" stroke-width="0.9" fill="none"/>

  <ellipse cx="115" cy="140" rx="11" ry="9" fill="#0c0a08"/>
  <ellipse cx="115" cy="140" rx="10" ry="8" fill="#c8a030"/>
  <ellipse cx="115" cy="140" rx="7" ry="6.5" fill="#906010"/>
  <ellipse cx="115" cy="140" rx="4" ry="4" fill="#080604"/>
  <ellipse cx="112" cy="137" rx="2.5" ry="2" fill="white" opacity="0.9"/>
  <ellipse cx="118" cy="143" rx="1.2" ry="1.2" fill="white" opacity="0.4"/>
  <path d="M 104 131 Q 115 127 126 131" stroke="#403020" stroke-width="1.8" fill="none"/>
  <path d="M 105 148 Q 115 152 125 148" stroke="#403020" stroke-width="0.9" fill="none"/>

  <!-- Nose -->
  <path d="M 97 155 Q 100 158 103 155" stroke="#c0a888" stroke-width="1.1" fill="none" stroke-linecap="round"/>

  <!-- Mouth - serene, composed authority -->
  <path d="M 88 168 Q 94 165 100 166 Q 106 165 112 168" stroke="#b09080" stroke-width="1.4" fill="none" stroke-linecap="round"/>
  <path d="M 91 170 Q 100 174 109 170" stroke="#c8a890" stroke-width="0.8" fill="none"/>

  <!-- Blush - refined, near none -->
  <ellipse cx="74" cy="157" rx="8" ry="5" fill="#f0c67c" opacity="0.1"/>
  <ellipse cx="126" cy="157" rx="8" ry="5" fill="#f0c67c" opacity="0.1"/>

  <!-- Ears -->
  <ellipse cx="58" cy="152" rx="5" ry="7" fill="#e4ceb8"/>
  <ellipse cx="142" cy="152" rx="5" ry="7" fill="#e4ceb8"/>
  <!-- Gold earring -->
  <ellipse cx="58" cy="160" rx="3.5" ry="3.5" fill="#f0c67c" opacity="0.7"/>
  <ellipse cx="142" cy="160" rx="3.5" ry="3.5" fill="#f0c67c" opacity="0.7"/>

  <!-- Name plate -->
  <rect x="0" y="270" width="200" height="30" fill="#06060c" opacity="0.9"/>
  <rect x="0" y="270" width="200" height="1" fill="#f0c67c" opacity="0.7"/>
  <text x="100" y="284" text-anchor="middle" font-family="monospace" font-size="9" fill="#f0c67c" letter-spacing="3">ZENO</text>
  <text x="100" y="295" text-anchor="middle" font-family="monospace" font-size="7" fill="#887850" letter-spacing="2">GRAND LEAGUE CHAMPION</text>
</svg>
