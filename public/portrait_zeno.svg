  <ellipse cx="90" cy="66" rx="20" ry="8" fill="white" opacity="0.35" transform="rotate(-10 90 66)"/>
  <ellipse cx="106" cy="72" rx="10" ry="4" fill="white" opacity="0.2" transform="rotate(-10 106 72)"/>
  <!-- Crown/tiara accent -->
  <path d="M 74 96 L 78 88 L 84 95 L 90 82 L 96 95 L 100 80 L 104 95 L 110 82 L 116 95 L 122 88 L 126 96" stroke="#f0c67c" stroke-width="1.8" fill="none" opacity="0.8"/>
  <ellipse cx="100" cy="80" rx="3.5" ry="3.5" fill="#f0c67c" opacity="0.7"/>
  <ellipse cx="90" cy="82" rx="2" ry="2" fill="#f0c67c" opacity="0.5"/>
  <ellipse cx="110" cy="82" rx="2" ry="2" fill="#f0c67c" opacity="0.5"/>

