  <path d="M 58 148 Q 52 174 53 214 Q 54 248 60 266 Q 54 240 56 210 Q 58 180 62 160 Z" fill="#d4c8a0"/>
  <path d="M 142 148 Q 148 174 147 214 Q 146 248 140 266 Q 146 240 144 210 Q 142 180 138 160 Z" fill="#d4c8a0"/>
  <!-- Elegant swept bangs -->
  <path d="M 62 140 Q 60 118 66 104 Q 72 90 80 86 Q 88 82 92 88 Q 95 94 90 106 Q 85 116 78 124 Q 68 134 64 142 Z" fill="#f0e8d0"/>
  <path d="M 86 128 Q 90 106 98 100 Q 104 96 108 102 Q 110 110 106 122 Q 102 130 96 134 Z" fill="#dcd0b0"/>
  <path d="M 104 126 Q 110 106 118 100 Q 125 96 128 104 Q 128 114 122 124 Q 116 130 110 132 Z" fill="#f0e8d0"/>
