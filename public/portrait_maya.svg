<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300" width="200" height="300">
  <defs>
    <radialGradient id="bg_maya" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#060d18"/>
      <stop offset="100%" stop-color="#020608"/>
    </radialGradient>
    <radialGradient id="skin_maya" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#eeddc8"/>
      <stop offset="100%" stop-color="#d4b898"/>
    </radialGradient>
    <linearGradient id="hair_maya" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" stop-color="#8ac8e8"/>
      <stop offset="50%" stop-color="#3488b8"/>
      <stop offset="100%" stop-color="#0c3c5c"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="200" height="300" fill="url(#bg_maya)"/>
  <ellipse cx="100" cy="120" rx="80" ry="90" fill="#76b7ff" opacity="0.06"/>
  <!-- Water ripple effect -->
  <ellipse cx="100" cy="280" rx="90" ry="20" fill="#76b7ff" opacity="0.04"/>
  <ellipse cx="100" cy="270" rx="70" ry="14" fill="#76b7ff" opacity="0.03"/>

  <!-- Faction accent bar -->
  <rect x="0" y="0" width="200" height="3" fill="#76b7ff" opacity="0.8"/>

  <!-- Body / shoulders - elegant dress/uniform -->
  <path d="M 28 300 Q 42 238 66 216 Q 86 202 100 200 Q 114 202 134 216 Q 158 238 172 300 Z" fill="#060d18"/>
  <!-- Outfit - high collar elegant -->
  <path d="M 66 216 Q 86 206 100 204 Q 114 206 134 216 L 128 240 Q 110 228 100 226 Q 90 228 72 240 Z" fill="#1e4870"/>
  <!-- Collar accent -->
  <path d="M 91 204 L 100 226 L 109 204" fill="#76b7ff" opacity="0.5"/>
  <path d="M 72 240 Q 90 230 100 228 Q 110 230 128 240 L 122 265 Q 104 256 100 254 Q 96 256 78 265 Z" fill="#0a1e30"/>

  <!-- Neck -->
  <path d="M 88 193 L 88 215 L 112 215 L 112 193 Z" fill="url(#skin_maya)"/>

  <!-- Head -->
  <ellipse cx="100" cy="157" rx="43" ry="47" fill="url(#skin_maya)"/>

  <!-- Hair - long flowing, back layer -->
  <path d="M 58 170 Q 50 200 54 240 Q 56 260 62 270 Q 55 240 58 210 Q 60 185 66 168 Z" fill="#0c3c5c"/>
  <path d="M 142 170 Q 150 200 146 240 Q 144 260 138 270 Q 145 240 142 210 Q 140 185 134 168 Z" fill="#0c3c5c"/>
  <!-- Main hair -->
  <path d="M 60 148 Q 55 120 58 92 Q 63 64 82 52 Q 100 43 118 52 Q 137 64 142 92 Q 145 120 140 148 Q 122 132 100 130 Q 78 132 60 148 Z" fill="url(#hair_maya)"/>
  <!-- Long side strands -->
  <path d="M 60 148 Q 54 170 54 205 Q 54 235 60 255 Q 56 228 58 200 Q 60 175 64 158 Z" fill="#3488b8"/>
  <path d="M 140 148 Q 146 170 146 205 Q 146 235 140 255 Q 144 228 142 200 Q 140 175 136 158 Z" fill="#3488b8"/>
  <!-- Bangs - smooth and parted -->
  <path d="M 64 126 Q 68 108 76 100 Q 83 94 88 98 Q 92 102 88 112 Q 84 120 78 124 Z" fill="#8ac8e8"/>
  <path d="M 86 122 Q 90 106 97 100 Q 102 96 106 100 Q 108 106 104 116 Q 100 124 96 126 Z" fill="#5aa8d0"/>
  <path d="M 104 122 Q 110 106 118 100 Q 124 96 128 100 Q 130 107 126 118 Q 122 126 116 128 Z" fill="#8ac8e8"/>
  <!-- Hair shine -->
  <ellipse cx="92" cy="72" rx="16" ry="7" fill="#c0e8ff" opacity="0.3" transform="rotate(-10 92 72)"/>
  <!-- Hair ornament - small wave clip -->
  <path d="M 122 108 Q 130 104 134 108 Q 136 112 132 115 Q 128 117 124 114 Z" fill="#76b7ff" opacity="0.8"/>
  <ellipse cx="129" cy="110" rx="3" ry="3" fill="#c0e8ff" opacity="0.6"/>

  <!-- Eyebrows - elegant, slightly arched -->
  <path d="M 76 130 Q 84 126 92 128" stroke="#2c5878" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M 108 128 Q 116 126 124 130" stroke="#2c5878" stroke-width="1.8" fill="none" stroke-linecap="round"/>

  <!-- Eyes - cool blue, calm -->
  <ellipse cx="84" cy="142" rx="11" ry="9" fill="#04101c"/>
  <ellipse cx="84" cy="142" rx="10" ry="8" fill="#4a9cc8"/>
  <ellipse cx="84" cy="142" rx="7" ry="6.5" fill="#1e6090"/>
  <ellipse cx="84" cy="142" rx="4" ry="4" fill="#040c14"/>
  <ellipse cx="81" cy="139" rx="2.2" ry="1.8" fill="white" opacity="0.9"/>
  <ellipse cx="87" cy="144" rx="1" ry="1" fill="white" opacity="0.5"/>
  <path d="M 73 134 Q 84 130 95 134" stroke="#1a3a54" stroke-width="1.6" fill="none"/>

  <ellipse cx="116" cy="142" rx="11" ry="9" fill="#04101c"/>
  <ellipse cx="116" cy="142" rx="10" ry="8" fill="#4a9cc8"/>
  <ellipse cx="116" cy="142" rx="7" ry="6.5" fill="#1e6090"/>
  <ellipse cx="116" cy="142" rx="4" ry="4" fill="#040c14"/>
  <ellipse cx="113" cy="139" rx="2.2" ry="1.8" fill="white" opacity="0.9"/>
  <ellipse cx="119" cy="144" rx="1" ry="1" fill="white" opacity="0.5"/>
  <path d="M 105 134 Q 116 130 127 134" stroke="#1a3a54" stroke-width="1.6" fill="none"/>

  <!-- Nose -->
  <path d="M 97 155 Q 100 158 103 155" stroke="#b89880" stroke-width="1.1" fill="none" stroke-linecap="round"/>

  <!-- Mouth - composed, slight curve -->
  <path d="M 88 168 Q 94 165 100 166 Q 106 165 112 168" stroke="#a07868" stroke-width="1.4" fill="none" stroke-linecap="round"/>
  <path d="M 90 170 Q 100 174 110 170" stroke="#c09080" stroke-width="0.9" fill="none"/>

  <!-- Cheek blush - very subtle -->
  <ellipse cx="74" cy="157" rx="8" ry="5" fill="#a0c0e0" opacity="0.15"/>
  <ellipse cx="126" cy="157" rx="8" ry="5" fill="#a0c0e0" opacity="0.15"/>

  <!-- Ears -->
  <ellipse cx="58" cy="152" rx="5" ry="7" fill="#d4b898"/>
  <ellipse cx="142" cy="152" rx="5" ry="7" fill="#d4b898"/>
  <!-- Earring - small teardrop -->
  <ellipse cx="58" cy="162" rx="2.5" ry="3.5" fill="#76b7ff" opacity="0.8"/>
  <ellipse cx="142" cy="162" rx="2.5" ry="3.5" fill="#76b7ff" opacity="0.8"/>

  <!-- Name plate -->
  <rect x="0" y="270" width="200" height="30" fill="#020608" opacity="0.9"/>
  <rect x="0" y="270" width="200" height="1" fill="#76b7ff" opacity="0.7"/>
  <text x="100" y="284" text-anchor="middle" font-family="monospace" font-size="9" fill="#76b7ff" letter-spacing="3">MAYA</text>
  <text x="100" y="295" text-anchor="middle" font-family="monospace" font-size="7" fill="#506880" letter-spacing="2">TIDE CLUB MASTER</text>
</svg>
