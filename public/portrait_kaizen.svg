<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300" width="200" height="300">
  <defs>
    <radialGradient id="bg_kz" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#1a0c06"/>
      <stop offset="100%" stop-color="#080404"/>
    </radialGradient>
    <radialGradient id="skin_kz" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#f0c898"/>
      <stop offset="100%" stop-color="#d9a070"/>
    </radialGradient>
    <linearGradient id="hair_kz" x1="0%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#d43810"/>
      <stop offset="40%" stop-color="#8a1c04"/>
      <stop offset="100%" stop-color="#2a0800"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="200" height="300" fill="url(#bg_kz)"/>
  <ellipse cx="100" cy="120" rx="75" ry="85" fill="#cf6547" opacity="0.07"/>

  <!-- Faction accent bar -->
  <rect x="0" y="0" width="200" height="3" fill="#cf6547" opacity="0.9"/>

  <!-- Body / shoulders - sporty jacket -->
  <path d="M 25 300 Q 38 235 62 215 Q 82 202 100 200 Q 118 202 138 215 Q 162 235 175 300 Z" fill="#1a0a04"/>
  <!-- Jacket detail -->
  <path d="M 62 215 Q 82 205 100 203 Q 118 205 138 215 L 132 238 Q 112 226 100 224 Q 88 226 68 238 Z" fill="#cf6547"/>
  <path d="M 88 203 L 96 224 L 104 203" fill="#ff8060" opacity="0.5"/>
  <!-- Collar/undershirt -->
  <path d="M 68 238 Q 88 228 100 226 Q 112 228 132 238 L 126 262 Q 108 254 100 252 Q 92 254 74 262 Z" fill="#0d0604"/>

  <!-- Neck -->
  <path d="M 87 192 L 87 215 L 113 215 L 113 192 Z" fill="url(#skin_kz)"/>

  <!-- Head -->
  <ellipse cx="100" cy="158" rx="44" ry="47" fill="url(#skin_kz)"/>

  <!-- Hair - back/wild -->
  <path d="M 56 138 Q 50 110 55 82 Q 62 55 82 44 Q 100 36 118 44 Q 138 55 145 82 Q 150 110 144 138 Z" fill="#2a0800"/>
  <!-- Main hair with spiky texture -->
  <path d="M 58 142 Q 52 112 56 84 Q 62 57 82 46 Q 100 38 118 46 Q 138 57 144 84 Q 148 112 142 142 Q 128 125 100 122 Q 72 125 58 142 Z" fill="url(#hair_kz)"/>
  <!-- Spiky bangs -->
  <path d="M 64 118 Q 66 98 74 88 Q 80 80 86 84 Q 89 88 86 98 Q 82 108 78 116 Z" fill="#d43810"/>
  <path d="M 80 112 Q 84 90 92 84 Q 98 80 102 86 Q 104 93 100 104 Q 96 112 92 116 Z" fill="#c02800"/>
  <path d="M 98 110 Q 104 88 112 84 Q 118 82 122 88 Q 124 96 120 108 Q 116 116 110 118 Z" fill="#d43810"/>
  <path d="M 116 116 Q 124 96 132 94 Q 138 94 138 104 Q 136 114 130 120 Z" fill="#b82000"/>
  <!-- Left spikes going outward -->
  <path d="M 58 142 Q 48 128 44 115 Q 42 104 48 100 Q 54 98 58 108 Q 60 120 62 132 Z" fill="#8a1c04"/>
  <!-- Right spike -->
  <path d="M 142 142 Q 152 128 156 115 Q 158 104 152 100 Q 146 98 142 108 Q 140 120 138 132 Z" fill="#8a1c04"/>
  <!-- Hair shine -->
  <ellipse cx="92" cy="66" rx="14" ry="6" fill="#ff6040" opacity="0.3" transform="rotate(-20 92 66)"/>

  <!-- Eyebrows - sharp, expressive -->
  <path d="M 74 128 Q 82 122 92 126" stroke="#4a0c00" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 108 126 Q 118 122 126 128" stroke="#4a0c00" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Eyes - intense orange -->
  <ellipse cx="83" cy="140" rx="11" ry="9" fill="#1a0800"/>
  <ellipse cx="83" cy="140" rx="10" ry="8" fill="#e05a18"/>
  <ellipse cx="83" cy="140" rx="7" ry="6.5" fill="#a03010"/>
  <ellipse cx="83" cy="140" rx="4" ry="4" fill="#080400"/>
  <ellipse cx="80" cy="137" rx="2.2" ry="1.8" fill="white" opacity="0.9"/>
  <path d="M 72 133 Q 83 128 94 133 L 93 140 Q 83 136 73 140 Z" fill="#300a00" opacity="0.45"/>
  <!-- eyelid line -->
  <path d="M 72 133 Q 78 127 83 128 Q 88 127 94 133" stroke="#2a0800" stroke-width="1.8" fill="none"/>

  <ellipse cx="117" cy="140" rx="11" ry="9" fill="#1a0800"/>
  <ellipse cx="117" cy="140" rx="10" ry="8" fill="#e05a18"/>
  <ellipse cx="117" cy="140" rx="7" ry="6.5" fill="#a03010"/>
  <ellipse cx="117" cy="140" rx="4" ry="4" fill="#080400"/>
  <ellipse cx="114" cy="137" rx="2.2" ry="1.8" fill="white" opacity="0.9"/>
  <path d="M 106 133 Q 117 128 128 133 L 127 140 Q 117 136 107 140 Z" fill="#300a00" opacity="0.45"/>
  <path d="M 106 133 Q 112 127 117 128 Q 122 127 128 133" stroke="#2a0800" stroke-width="1.8" fill="none"/>

  <!-- Nose -->
  <path d="M 97 154 Q 100 157 103 154" stroke="#b88060" stroke-width="1.2" fill="none" stroke-linecap="round"/>

  <!-- Mouth - smirk -->
  <path d="M 88 167 Q 96 163 106 166 Q 110 168 112 171" stroke="#b86040" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M 106 166 Q 112 163 115 167" stroke="#d07050" stroke-width="1" fill="none"/>

  <!-- Cheek blush - faint -->
  <ellipse cx="74" cy="155" rx="7" ry="4" fill="#e07050" opacity="0.2"/>
  <ellipse cx="126" cy="155" rx="7" ry="4" fill="#e07050" opacity="0.2"/>

  <!-- Ears -->
  <ellipse cx="57" cy="152" rx="5" ry="7" fill="#d9a070"/>
  <ellipse cx="143" cy="152" rx="5" ry="7" fill="#d9a070"/>

  <!-- Name plate -->
  <rect x="0" y="270" width="200" height="30" fill="#080404" opacity="0.9"/>
  <rect x="0" y="270" width="200" height="1" fill="#cf6547" opacity="0.7"/>
  <text x="100" y="284" text-anchor="middle" font-family="monospace" font-size="9" fill="#cf6547" letter-spacing="3">KAIZEN</text>
  <text x="100" y="295" text-anchor="middle" font-family="monospace" font-size="7" fill="#886655" letter-spacing="2">RIVAL DUELIST</text>
</svg>
