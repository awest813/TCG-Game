<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300" width="200" height="300">
  <defs>
    <radialGradient id="bg_luna" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#160810"/>
      <stop offset="100%" stop-color="#080406"/>
    </radialGradient>
    <radialGradient id="skin_luna" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#f4d0c0"/>
      <stop offset="100%" stop-color="#e0b098"/>
    </radialGradient>
    <linearGradient id="hair_luna" x1="10%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#d060b8"/>
      <stop offset="40%" stop-color="#8a1e78"/>
      <stop offset="100%" stop-color="#240828"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="200" height="300" fill="url(#bg_luna)"/>
  <ellipse cx="100" cy="120" rx="75" ry="85" fill="#cf6547" opacity="0.08"/>
  <!-- Stage light effect -->
  <path d="M 100 0 L 70 120 L 130 120 Z" fill="#ff8060" opacity="0.04"/>
  <path d="M 100 0 L 85 110 L 115 110 Z" fill="#ffd0c0" opacity="0.04"/>

  <!-- Faction accent bar -->
  <rect x="0" y="0" width="200" height="3" fill="#cf6547" opacity="0.9"/>

  <!-- Body - stylish stage outfit -->
  <path d="M 24 300 Q 38 234 64 212 Q 84 198 100 196 Q 116 198 136 212 Q 162 234 176 300 Z" fill="#160810"/>
  <!-- Stage jacket/dramatic collar -->
  <path d="M 64 212 Q 84 200 100 198 Q 116 200 136 212 L 130 236 Q 112 222 100 220 Q 88 222 70 236 Z" fill="#8a1e48"/>
  <!-- V-neck detail -->
  <path d="M 88 198 L 100 224 L 112 198" fill="#cf6547" opacity="0.6"/>
  <!-- Ruffled bottom of jacket -->
  <path d="M 70 236 Q 88 227 100 225 Q 112 227 130 236 Q 132 244 130 252 Q 112 244 100 242 Q 88 244 70 252 Q 68 244 70 236 Z" fill="#5a1030"/>

  <!-- Neck -->
  <path d="M 88 190 L 88 212 L 112 212 L 112 190 Z" fill="url(#skin_luna)"/>

  <!-- Head -->
  <ellipse cx="100" cy="154" rx="43" ry="47" fill="url(#skin_luna)"/>

  <!-- Hair - long wavy dramatic -->
  <!-- Back hair - very long -->
  <path d="M 56 165 Q 48 200 50 250 Q 52 275 58 290 Q 50 265 52 230 Q 54 195 60 165 Z" fill="#240828"/>
  <path d="M 144 165 Q 152 200 150 250 Q 148 275 142 290 Q 150 265 148 230 Q 146 195 140 165 Z" fill="#240828"/>
  <!-- Main hair body -->
  <path d="M 58 148 Q 53 118 57 90 Q 63 62 82 50 Q 100 41 118 50 Q 137 62 143 90 Q 147 118 142 148 Q 124 132 100 130 Q 76 132 58 148 Z" fill="url(#hair_luna)"/>
  <!-- Flowing side waves left -->
  <path d="M 58 148 Q 52 172 52 210 Q 52 240 58 262 Q 54 234 56 206 Q 58 178 62 158 Z" fill="#d060b8"/>
  <path d="M 62 158 Q 56 182 58 218 Q 60 248 66 268 Q 60 240 62 212 Q 64 184 68 164 Z" fill="#8a1e78" opacity="0.7"/>
  <!-- Flowing side waves right -->
  <path d="M 142 148 Q 148 172 148 210 Q 148 240 142 262 Q 146 234 144 206 Q 142 178 138 158 Z" fill="#d060b8"/>
  <!-- Dramatic big curly bang on left -->
  <path d="M 60 148 Q 56 130 60 115 Q 64 100 72 94 Q 80 88 86 92 Q 92 96 90 108 Q 86 118 80 126 Q 72 134 64 142 Z" fill="#c048a8"/>
  <!-- Front bangs -->
  <path d="M 80 128 Q 84 108 92 100 Q 98 94 104 98 Q 108 104 104 116 Q 100 126 94 130 Z" fill="#d060b8"/>
  <path d="M 102 126 Q 108 106 116 100 Q 122 96 127 100 Q 130 107 126 118 Q 122 126 116 130 Z" fill="#c048a8"/>
  <!-- Wavy texture strands -->
  <path d="M 64 142 Q 62 156 64 172 Q 66 188 64 202" stroke="#e070c8" stroke-width="1.5" fill="none" opacity="0.4"/>
  <!-- Hair shine -->
  <ellipse cx="90" cy="68" rx="16" ry="6" fill="#f090d8" opacity="0.3" transform="rotate(-15 90 68)"/>
  <!-- Hair accessories - small star clips -->
  <polygon points="130,102 132,107 137,107 133,110 135,115 130,112 125,115 127,110 123,107 128,107" fill="#cf6547" opacity="0.9" transform="scale(0.55) translate(107,84)"/>

  <!-- Eyebrows - expressive dramatic -->
  <path d="M 75 128 Q 83 123 92 126" stroke="#4a1028" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 108 126 Q 117 122 125 127" stroke="#4a1028" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Eyes - dramatic magenta/purple -->
  <ellipse cx="84" cy="140" rx="11" ry="9.5" fill="#100610"/>
  <ellipse cx="84" cy="140" rx="10" ry="8.5" fill="#c040a0"/>
  <ellipse cx="84" cy="140" rx="7" ry="6.5" fill="#801870"/>
  <ellipse cx="84" cy="140" rx="4" ry="4" fill="#080408"/>
  <ellipse cx="81" cy="137" rx="2.5" ry="2" fill="white" opacity="0.9"/>
  <ellipse cx="87" cy="143" rx="1" ry="1" fill="white" opacity="0.5"/>
  <path d="M 73 131 Q 84 126 95 131" stroke="#300a20" stroke-width="2" fill="none"/>
  <path d="M 73 149 Q 78 153 84 151 Q 90 153 95 149" stroke="#300a20" stroke-width="1" fill="none"/>

  <ellipse cx="116" cy="140" rx="11" ry="9.5" fill="#100610"/>
  <ellipse cx="116" cy="140" rx="10" ry="8.5" fill="#c040a0"/>
  <ellipse cx="116" cy="140" rx="7" ry="6.5" fill="#801870"/>
  <ellipse cx="116" cy="140" rx="4" ry="4" fill="#080408"/>
  <ellipse cx="113" cy="137" rx="2.5" ry="2" fill="white" opacity="0.9"/>
  <ellipse cx="119" cy="143" rx="1" ry="1" fill="white" opacity="0.5"/>
  <path d="M 105 131 Q 116 126 127 131" stroke="#300a20" stroke-width="2" fill="none"/>
  <path d="M 105 149 Q 110 153 116 151 Q 122 153 127 149" stroke="#300a20" stroke-width="1" fill="none"/>

  <!-- Nose -->
  <path d="M 97 154 Q 100 157 103 154" stroke="#c09080" stroke-width="1.2" fill="none" stroke-linecap="round"/>

  <!-- Mouth - expressive, slight smile with visible teeth hint -->
  <path d="M 87 167 Q 94 163 100 164 Q 106 163 113 167" stroke="#c06070" stroke-width="1.6" fill="none" stroke-linecap="round"/>
  <path d="M 90 170 Q 100 176 110 170" stroke="#e080a0" stroke-width="1" fill="none"/>

  <!-- Blush - soft rosy -->
  <ellipse cx="74" cy="156" rx="9" ry="5.5" fill="#e070a0" opacity="0.25"/>
  <ellipse cx="126" cy="156" rx="9" ry="5.5" fill="#e070a0" opacity="0.25"/>

  <!-- Ears -->
  <ellipse cx="58" cy="150" rx="5" ry="7" fill="#e0b098"/>
  <ellipse cx="142" cy="150" rx="5" ry="7" fill="#e0b098"/>
  <!-- Dangling earring - star -->
  <line x1="58" y1="157" x2="58" y2="164" stroke="#cf6547" stroke-width="1.2"/>
  <polygon points="58,164 59.5,168 63,168 60.5,170.5 61.5,174.5 58,172 54.5,174.5 55.5,170.5 53,168 56.5,168" fill="#cf6547" transform="scale(0.6) translate(38,110)"/>

  <!-- Name plate -->
  <rect x="0" y="270" width="200" height="30" fill="#080406" opacity="0.9"/>
  <rect x="0" y="270" width="200" height="1" fill="#cf6547" opacity="0.7"/>
  <text x="100" y="284" text-anchor="middle" font-family="monospace" font-size="9" fill="#cf6547" letter-spacing="3">LUNA</text>
  <text x="100" y="295" text-anchor="middle" font-family="monospace" font-size="7" fill="#806058" letter-spacing="2">NEON CLUB MASTER</text>
</svg>
